<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">

  <link rel="icon" href="{{ get_url(path='favicon.svg') }}" type="image/svg+xml">

  <!-- Atkinson Hyperlegible Next + Mono from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Atkinson+Hyperlegible+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ get_url(path='main.css') }}">

  {% if config.generate_feeds %}
  <link rel="alternate" type="application/atom+xml" title="{{ config.title }} Feed" href="{{ get_url(path='atom.xml') }}">
  {% endif %}

  {% block head_extra %}{% endblock %}
</head>
<body>
  <canvas id="fractal-bg" aria-hidden="true"></canvas>
  <header class="site-header">
    <div class="container">
      <a href="{{ config.base_url }}" class="site-logo">PulseEngine</a>
      <nav class="site-nav">
        <a href="{{ get_url(path='@/_index.md') }}"{% if current_path == "/" %} class="active"{% endif %}>Home</a>
        <a href="{{ get_url(path='@/blog/_index.md') }}"{% if current_path is starting_with("/blog") %} class="active"{% endif %}>Blog</a>
        <a href="{{ get_url(path='@/projects/_index.md') }}"{% if current_path is starting_with("/projects") %} class="active"{% endif %}>Projects</a>
        <a href="{{ get_url(path='@/reports/_index.md') }}"{% if current_path is starting_with("/reports") %} class="active"{% endif %}>Reports</a>
        <a href="https://github.com/pulseengine" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      &copy; {{ now() | date(format="%Y") }} PulseEngine &middot; Built with <a href="https://www.getzola.org">Zola</a>
      <span class="build-ref"><!-- BUILD_INFO --></span>
    </div>
  </footer>
  <script src="{{ get_url(path='mandelbrot.js') }}" defer></script>
</body>
</html>
