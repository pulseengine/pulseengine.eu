name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1

      - name: Inject git info into blog posts
        run: python3 scripts/inject-git-info.py

      - name: Inject build info
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          sed -i "s|<!-- BUILD_INFO -->|· <a href=\"${COMMIT_URL}\">${SHORT_SHA}</a> · <a href=\"${RUN_URL}\">deploy #${GITHUB_RUN_NUMBER}</a>|" templates/base.html

      - name: Build
        run: zola build

      - name: Deploy via SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Package site into a tarball
          tar -czf site.tar.gz -C public .

          # Upload tarball
          scp -i ~/.ssh/deploy_key "site.tar.gz" "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/site.tar.gz"

          # Extract on remote, replacing old content
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "
            cd ${DEPLOY_PATH} &&
            find . -mindepth 1 -not -name site.tar.gz -delete 2>/dev/null;
            tar -xzf site.tar.gz &&
            rm site.tar.gz
          "

          rm -f ~/.ssh/deploy_key
